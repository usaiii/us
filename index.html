<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>要啥直接问</title>
<style>
:root {
  --bg1: #0b1116;
  --bg2: #141824;
  --bg3: #1d2333;
  --accent: #fff;
}
* {margin:0;padding:0;box-sizing:border-box}
html,body {height:100%}
body {
  font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background: linear-gradient(180deg, var(--bg1), var(--bg2) 50%, var(--bg3));
  color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(8px);
  border-radius: 14px;
  padding: 28px 32px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  max-width: 420px;
  width: 100%;
  animation: fadeInUp 0.6s ease-out both;
}
header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}
.logo {
  width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
}
.logo svg {
  width: 28px; height: 28px;
}
.eyebrow {
  font-size: 0.95rem;
  opacity: 0.75;
}
h1 {
  font-size: clamp(1.4rem, 4vw, 2rem);
  line-height: 1.2;
  font-weight: 700;
  margin-bottom: 16px;
}
.contacts {
  display: flex; flex-wrap: wrap; gap: 10px;
}
.contacts {
  display: flex;
  justify-content: space-between;
}

.contact-btn {
  flex: 1;                        
  text-align: center;             
  padding: 6px 12px;
  margin: 0 4px;                   
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.06);
  font-size: 0.95rem;
  text-decoration: none;
  color: var(--accent);
  transition: all 0.25s ease;
}

.contacts .contact-btn:first-child {
  margin-left: 0;                  
}
.contacts .contact-btn:last-child {
  margin-right: 0;                 
}
.contact-btn:hover {
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.4);
}

/* 淡入+上移动效 */
@keyframes fadeInUp {
  from {opacity:0; transform: translateY(12px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>
<body>
  <div class="card">
    <header>
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="20" height="20" rx="6" fill="white" opacity="0.06"/>
          <path d="M6 9c1.5-2 5-2 7 0s5.5 2 7 0" stroke="white" stroke-opacity="0.9" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="eyebrow">你好，世界。</div>
    </header>
    <h1>别找了，直接问！需要什么，我们帮你搞定！</h1>
    <div class="contacts">
      <a class="contact-btn" href="https://qm.qq.com/q/viGtNvXNJu">QQ: <strong>914339216</strong></a>
      <a class="contact-btn" href="https://t.me/uscii">Telegram: <strong>@uscii</strong></a>
    </div>
  </div>
</body>
</html>
